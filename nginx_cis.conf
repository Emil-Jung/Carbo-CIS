# Add inside the existing HTTPS server { } for bkweb3.bigk.co.uk.
#
# CIS is an INSTALLED desktop app. The server only needs to host its auto-update
# files (version.json + the .exe). The /cis/ web shell is optional (handy for a
# quick browser check) and can be omitted.
#
# Longest-prefix wins, so /cis/app/ is served as downloads even though /cis/ also matches.

    # --- CIS app auto-update files (REQUIRED): version.json + CarboCIS-Setup.exe ---
    location /cis/app/ {
        alias /opt/carbo/cis/app/;
        default_type application/octet-stream;
        add_header Cache-Control "no-store";
    }

    # --- CIS web shell (OPTIONAL browser access to the same modules) ---
    location /cis/ {
        alias /opt/carbo/cis/shell/;
        try_files $uri $uri/ /cis/index.html;
    }
