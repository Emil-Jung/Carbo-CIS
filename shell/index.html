<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="theme-color" content="#0c0c0c" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Carbo Integrated System</title>

  <link rel="manifest" href="manifest.json" />

  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />

  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />

</head>

<body>

  <!-- Login view -->

  <div id="login-view" class="login-view hidden">

    <form id="login-form" class="login-card" autocomplete="on">

      <div class="login-logo-wrap">

        <img class="login-logo" src="assets/logo.png" alt="Carbo" width="92" height="92" />

      </div>

      <h1 class="brand">Carbo Integrated System</h1>

      <p class="subtitle">Sign in to continue</p>

      <label for="login-id">User ID</label>

      <input id="login-id" name="username" type="text" autocomplete="username" required />

      <label for="login-password">Password</label>

      <input id="login-password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit" id="login-btn">Sign in</button>

      <p id="login-error" class="login-error hidden"></p>
      <p class="login-hint muted">First time? Use the link your administrator sent — it includes your User ID.</p>
    </form>
  </div>

  <!-- First sign-in: create password -->
  <div id="setup-view" class="login-view hidden">
    <form id="setup-form" class="login-card" autocomplete="on">
      <div class="login-logo-wrap">
        <img class="login-logo" src="assets/logo.png" alt="Carbo" width="92" height="92" />
      </div>
      <h1 class="brand">Welcome</h1>
      <p class="subtitle">Create your password to sign in</p>
      <p class="setup-user-id">User ID: <strong id="setup-login-id"></strong></p>
      <label for="setup-password">New password (min 6 characters)</label>
      <input id="setup-password" name="new-password" type="password" autocomplete="new-password" required />
      <label for="setup-password2">Confirm password</label>
      <input id="setup-password2" name="confirm-password" type="password" autocomplete="new-password" required />
      <button type="submit" id="setup-btn">Create password & sign in</button>
      <button type="button" id="setup-back-btn" class="btn-ghost setup-back">Back to sign in</button>
      <p id="setup-error" class="login-error hidden"></p>
    </form>
  </div>

  <!-- App shell -->

  <div id="app-view" class="app-view hidden">

    <header class="topbar">

      <div class="topbar-left">

        <button type="button" id="back-btn" class="btn-ghost btn-back hidden" title="Back to dashboard" aria-label="Back to dashboard">← Back</button>

        <div class="topbar-brand-wrap">

          <img class="topbar-logo" src="assets/logo.png" alt="Carbo" width="72" height="72" />

          <span class="topbar-brand">Carbo Integrated System</span>

        </div>

      </div>

      <div class="topbar-center">

        <span id="topbar-context" class="topbar-context">Dashboard</span>

      </div>

      <div class="topbar-right">

        <span id="app-version" class="current-user"></span>

        <span id="current-user" class="current-user"></span>

        <button id="logout-btn" class="btn-ghost">Sign out</button>

      </div>

    </header>

    <div class="body">

      <main id="module-content" class="module-content"></main>

    </div>

  </div>



  <script src="auth.js"></script>
  <script src="modules/cis_helpers.js"></script>
  <script src="modules/dashboard.js"></script>
  <script src="modules/identity_admin.js?v=1.3.23"></script>
  <script src="modules/device_keys.js"></script>
  <script src="modules/quality_capture.js"></script>
  <script src="modules/quality_view.js"></script>
  <script src="modules/producers_office.js"></script>
  <script src="modules/traceability.js"></script>
  <script src="modules/producers_public.js"></script>
  <script src="modules/bag_stock.js"></script>
  <script src="modules/maintenance_manager.js"></script>
  <script src="modules/maintenance_certs.js"></script>
  <script src="modules/maintenance_ops.js"></script>
  <script src="modules/consumption.js"></script>

  <script src="app.js"></script>

</body>

</html>
